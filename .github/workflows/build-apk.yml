name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build APK (debug)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Capacitor sync (copia dist/ pro projeto Android)
        run: npx cap sync android

      - name: Gradle build (assembleDebug)
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK com SHA do commit
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             out/vestibular-${{ github.sha }}.apk

      - name: Upload APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: vestibular-apk
          path: out/vestibular-*.apk
          retention-days: 14
